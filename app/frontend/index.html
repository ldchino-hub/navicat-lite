<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <title>DB Tool Box PHP</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='10' y='20' width='80' height='60' rx='8' fill='%231976d2'/><text x='50' y='58' font-size='28' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='bold'>DB</text></svg>" />
    <style>
      #boot-fallback { display: none; font-family: system-ui, sans-serif; padding: 2rem; max-width: 32rem; margin: 2rem auto; }
      #boot-fallback.visible { display: block; }
      #boot-fallback h1 { font-size: 1.1rem; margin: 0 0 0.5rem; }
      #boot-fallback p { color: #444; font-size: 0.9rem; line-height: 1.4; }
      #boot-fallback code { background: #f0f0f0; padding: 0.1rem 0.3rem; border-radius: 3px; }
    </style>
  </head>
  <body class="bg-nv-bg text-nv-text">
    <div id="root"></div>
    <div id="boot-fallback" role="alert">
      <h1>DB Tool Box PHP no cargó</h1>
      <p>Prueba <strong>Cmd+Shift+R</strong> o abre en Chrome/Safari: <code>http://127.0.0.1:8081</code></p>
      <p id="boot-fallback-detail"></p>
    </div>
    <script>
      window.addEventListener('error', function (e) {
        document.getElementById('boot-fallback').classList.add('visible');
        document.getElementById('boot-fallback-detail').textContent = e.message || String(e);
      });
      window.addEventListener('unhandledrejection', function (e) {
        document.getElementById('boot-fallback').classList.add('visible');
        document.getElementById('boot-fallback-detail').textContent = String(e.reason || e);
      });
      setTimeout(function () {
        var root = document.getElementById('root');
        if (root && !root.innerHTML.trim()) {
          document.getElementById('boot-fallback').classList.add('visible');
        }
      }, 8000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
