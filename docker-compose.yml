services:
  dbtoolbox-lite:
    build:
      context: .
      dockerfile: Dockerfile
    image: dbtoolbox-lite:1.0.0
    container_name: DBToolBox-Lite
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - dbtoolbox-lite-storage:/var/www/html/storage
    ports:
      - "${DBTOOLBOX_LITE_PORT:-8789}:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1/api/health | grep -q '\"ok\":true'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    networks:
      - navicat-net

volumes:
  dbtoolbox-lite-storage:
    name: dbtoolbox-lite-storage

networks:
  navicat-net:
    external: true
    name: navicat-net
